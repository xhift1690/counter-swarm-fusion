<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Counter-Swarm Fusion — Live Demo</title>
<style>
  :root {
    --bg: #0b0f14;
    --panel: #11161d;
    --line: #1f2733;
    --text: #d7dee6;
    --muted: #7c8a9a;
    --drone: #ff4d4f;
    --confirmed: #4da3ff;
    --tentative: #ffb347;
    --asset: #f4f4f4;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
    display: flex;
    height: 100vh;
  }
  #sidebar {
    width: 280px;
    background: var(--panel);
    border-right: 1px solid var(--line);
    padding: 16px;
    overflow-y: auto;
    flex-shrink: 0;
  }
  #sidebar h1 { font-size: 15px; margin: 0 0 4px; }
  #sidebar p.sub { color: var(--muted); font-size: 12px; margin: 0 0 16px; }
  .controls { display: flex; gap: 8px; margin-bottom: 16px; }
  button {
    background: #1a2230; color: var(--text); border: 1px solid var(--line);
    border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer;
  }
  button:hover { background: #232d3d; }
  button.active { border-color: var(--confirmed); color: var(--confirmed); }
  .stat-row { display: flex; justify-content: space-between; font-size: 12px; padding: 4px 0; color: var(--muted); }
  .stat-row b { color: var(--text); font-weight: 600; }
  #track-list { margin-top: 12px; border-top: 1px solid var(--line); padding-top: 12px; }
  .track-item {
    font-size: 11px; padding: 6px 8px; margin-bottom: 4px; border-radius: 4px;
    background: #161c25; display: flex; justify-content: space-between; align-items: center;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  #canvas-wrap { flex: 1; position: relative; }
  canvas { width: 100%; height: 100%; display: block; }
  #legend {
    position: absolute; bottom: 16px; left: 16px; background: rgba(17,22,29,0.85);
    border: 1px solid var(--line); border-radius: 6px; padding: 10px 14px; font-size: 11px;
  }
  #legend div { margin: 3px 0; }
  #timestamp {
    position: absolute; top: 16px; right: 16px; background: rgba(17,22,29,0.85);
    border: 1px solid var(--line); border-radius: 6px; padding: 8px 14px; font-size: 12px; color: var(--muted);
  }
</style>
</head>
<body>

<div id="sidebar">
  <h1>Counter-Swarm Fusion</h1>
  <p class="sub">Live multi-sensor fusion + Kalman tracking demo</p>

  <div class="controls">
    <button id="btn-start">▶ Start</button>
    <button id="btn-stop">⏸ Stop</button>
    <button id="btn-reset">⟲ Reset</button>
  </div>

  <div class="stat-row"><span>Backend</span><b id="stat-conn">connecting…</b></div>
  <div class="stat-row"><span>Step</span><b id="stat-step">0</b></div>
  <div class="stat-row"><span>Confirmed tracks</span><b id="stat-confirmed">0</b></div>
  <div class="stat-row"><span>Tentative tracks</span><b id="stat-tentative">0</b></div>
  <div class="stat-row"><span>High-threat (&gt;0.6)</span><b id="stat-threat" style="color:var(--drone)">0</b></div>

  <div id="track-list"></div>
</div>

<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
  <div id="timestamp">t = 0.0s</div>
  <div id="legend">
    <div><span class="dot" style="background:var(--asset)"></span>Protected asset</div>
    <div><span class="dot" style="background:var(--confirmed)"></span>Confirmed track</div>
    <div><span class="dot" style="background:var(--tentative)"></span>Tentative track</div>
    <div>Label = threat score (0–1)</div>
  </div>
</div>

<script>
const API_BASE = ""; // relative — works when served from /demo/ by the same FastAPI app.
                       // If you open this file directly (file://) instead of via uvicorn,
                       // set this to "http://localhost:8000".
const POLL_INTERVAL_MS = 200;
const WORLD_HALF_EXTENT_M = 2200; // matches the simulator's ~2km approach radius

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let polling = false;
let pollHandle = null;
let dt = 0.5; // seconds per simulation step, matches SwarmScenario

function resizeCanvas() {
  const wrap = document.getElementById("canvas-wrap");
  canvas.width = wrap.clientWidth * devicePixelRatio;
  canvas.height = wrap.clientHeight * devicePixelRatio;
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

// World (east, north metres) -> screen pixels, origin centred, north = up
function worldToScreen(east, north) {
  const w = canvas.width / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;
  const scale = Math.min(w, h) / (2 * WORLD_HALF_EXTENT_M);
  const x = w / 2 + east * scale;
  const y = h / 2 - north * scale; // screen y grows downward, north should go up
  return [x, y];
}

function threatColor(score) {
  // green (safe) -> orange -> red (high threat)
  const r = Math.round(255 * Math.min(1, score * 1.4));
  const g = Math.round(200 * (1 - score));
  return `rgb(${r}, ${g}, 60)`;
}

function draw(snapshot) {
  const w = canvas.width / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);

  // background grid
  ctx.strokeStyle = "#1a212b";
  ctx.lineWidth = 1;
  const gridStep = 500; // metres
  for (let m = -WORLD_HALF_EXTENT_M; m <= WORLD_HALF_EXTENT_M; m += gridStep) {
    const [x1, y1] = worldToScreen(m, -WORLD_HALF_EXTENT_M);
    const [x2, y2] = worldToScreen(m, WORLD_HALF_EXTENT_M);
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    const [x3, y3] = worldToScreen(-WORLD_HALF_EXTENT_M, m);
    const [x4, y4] = worldToScreen(WORLD_HALF_EXTENT_M, m);
    ctx.beginPath(); ctx.moveTo(x3, y3); ctx.lineTo(x4, y4); ctx.stroke();
  }

  // protected asset at origin
  const [ax, ay] = worldToScreen(0, 0);
  ctx.fillStyle = "#f4f4f4";
  ctx.beginPath();
  ctx.moveTo(ax, ay - 9); ctx.lineTo(ax + 8, ay + 7); ctx.lineTo(ax - 8, ay + 7);
  ctx.closePath(); ctx.fill();

  // tracks
  let confirmed = 0, tentative = 0, highThreat = 0;
  const listEl = document.getElementById("track-list");
  listEl.innerHTML = "";

  (snapshot.tracks || []).forEach(t => {
    const [x, y] = worldToScreen(t.position.east_m, t.position.north_m);
    const isConfirmed = t.status === "CONFIRMED";
    if (isConfirmed) confirmed++; else tentative++;
    if (t.threat_score > 0.6) highThreat++;

    const color = isConfirmed ? threatColor(t.threat_score) : "#7c8a9a";

    // velocity vector
    const speedScale = 4;
    const [vx, vy] = worldToScreen(
      t.position.east_m + t.velocity.east_mps * speedScale,
      t.position.north_m + t.velocity.north_mps * speedScale
    );
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(vx, vy); ctx.stroke();

    // track marker
    ctx.beginPath();
    ctx.arc(x, y, isConfirmed ? 9 : 6, 0, 2 * Math.PI);
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.stroke();
    if (!isConfirmed) {
      ctx.setLineDash([2, 2]);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // threat score label
    ctx.fillStyle = color;
    ctx.font = "11px monospace";
    ctx.fillText(t.threat_score.toFixed(2), x + 12, y - 8);

    // sidebar entry
    const item = document.createElement("div");
    item.className = "track-item";
    item.innerHTML = `<span><span class="dot" style="background:${color}"></span>${t.track_id.slice(0,8)}</span><span>${t.threat_score.toFixed(2)}</span>`;
    listEl.appendChild(item);
  });

  document.getElementById("stat-step").textContent = snapshot.step ?? 0;
  document.getElementById("stat-confirmed").textContent = confirmed;
  document.getElementById("stat-tentative").textContent = tentative;
  document.getElementById("stat-threat").textContent = highThreat;
  document.getElementById("timestamp").textContent = `t = ${((snapshot.step ?? 0) * dt).toFixed(1)}s`;
}

async function pollOnce() {
  try {
    const res = await fetch(`${API_BASE}/simulate/step`, { method: "POST" });
    const data = await res.json();
    document.getElementById("stat-conn").textContent = "connected";
    document.getElementById("stat-conn").style.color = "#4da3ff";
    draw(data);
    if (data.done) stopPolling();
  } catch (err) {
    document.getElementById("stat-conn").textContent = "offline";
    document.getElementById("stat-conn").style.color = "#ff4d4f";
    stopPolling();
  }
}

function startPolling() {
  if (polling) return;
  polling = true;
  document.getElementById("btn-start").classList.add("active");
  pollHandle = setInterval(pollOnce, POLL_INTERVAL_MS);
}

function stopPolling() {
  polling = false;
  document.getElementById("btn-start").classList.remove("active");
  if (pollHandle) clearInterval(pollHandle);
}

async function resetSim() {
  stopPolling();
  await fetch(`${API_BASE}/simulate/reset`, { method: "POST" });
  document.getElementById("track-list").innerHTML = "";
  draw({ step: 0, tracks: [] });
}

document.getElementById("btn-start").addEventListener("click", startPolling);
document.getElementById("btn-stop").addEventListener("click", stopPolling);
document.getElementById("btn-reset").addEventListener("click", resetSim);

draw({ step: 0, tracks: [] });
</script>
</body>
</html>
